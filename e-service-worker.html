<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>โปรแกรมคำนวณค่าแรงคนงาน - Boonrodchoo House</title>
  
  <script src="https://cdn.tailwindcss.com"></script>
  
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700&display=swap');
    body { font-family: 'Sarabun', sans-serif; background-color: #f9fafb; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState } = React;

    // --- รวมไอคอน (SVG) เพื่อให้ไฟล์เดียวทำงานได้สมบูรณ์ ---
    const IconFileText = () => <svg width="24" height="24" fill="none" stroke="currentColor" strokeWidth="2" viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline><line x1="16" y1="13" x2="8" y2="13"></line><line x1="16" y1="17" x2="8" y2="17"></line><polyline points="10 9 9 9 8 9"></polyline></svg>;
    const IconPlus = () => <svg width="20" height="20" fill="none" stroke="currentColor" strokeWidth="2" viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>;
    const IconSave = () => <svg width="18" height="18" fill="none" stroke="currentColor" strokeWidth="2" viewBox="0 0 24 24"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"></path><polyline points="17 21 17 13 7 13 7 21"></polyline><polyline points="7 3 7 8 15 8"></polyline></svg>;
    const IconFileDown = () => <svg width="16" height="16" fill="none" stroke="currentColor" strokeWidth="2" viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline><line x1="12" y1="18" x2="12" y2="12"></line><polyline points="9 15 12 18 15 15"></polyline></svg>;
    const IconImage = () => <svg width="16" height="16" fill="none" stroke="currentColor" strokeWidth="2" viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect><circle cx="8.5" cy="8.5" r="1.5"></circle><polyline points="21 15 16 10 5 21"></polyline></svg>;
    const IconEye = () => <svg width="16" height="16" fill="none" stroke="currentColor" strokeWidth="2" viewBox="0 0 24 24"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle></svg>;
    const IconTrash = () => <svg width="16" height="16" fill="none" stroke="currentColor" strokeWidth="2" viewBox="0 0 24 24"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path><line x1="10" y1="11" x2="10" y2="17"></line><line x1="14" y1="11" x2="14" y2="17"></line></svg>;
    const IconX = () => <svg width="20" height="20" fill="none" stroke="currentColor" strokeWidth="2" viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>;

    const App = () => {
      const [workers, setWorkers] = useState([]);
      const [formData, setFormData] = useState({ name: '', daysWorked: '', dailyWage: '', advance: '' });
      const [selectedWorker, setSelectedWorker] = useState(null);
      const [isExporting, setIsExporting] = useState(false);

      const calculatedTotal = (parseFloat(formData.daysWorked) || 0) * (parseFloat(formData.dailyWage) || 0);
      const calculatedBalance = calculatedTotal - (parseFloat(formData.advance) || 0);

      const handleInputChange = (e) => {
        const { name, value } = e.target;
        setFormData({ ...formData, [name]: value });
      };

      const handleAddWorker = (e) => {
        e.preventDefault();
        if (!formData.name || !formData.daysWorked || !formData.dailyWage) {
          alert('กรุณากรอกข้อมูล ชื่อ, วันทำงาน และ ค่าแรง ให้ครบถ้วน');
          return;
        }
        const newWorker = {
          id: Date.now().toString(),
          name: formData.name,
          daysWorked: parseFloat(formData.daysWorked),
          dailyWage: parseFloat(formData.dailyWage),
          total: calculatedTotal,
          advance: parseFloat(formData.advance) || 0,
          balance: calculatedBalance
        };
        setWorkers([...workers, newWorker]);
        setFormData({ name: '', daysWorked: '', dailyWage: '', advance: '' });
      };

      const handleDelete = (id) => {
        if (window.confirm('คุณต้องการลบข้อมูลนี้ใช่หรือไม่?')) {
          setWorkers(workers.filter(w => w.id !== id));
        }
      };

      const formatNumber = (num) => {
        return Number(num).toLocaleString('th-TH', { minimumFractionDigits: 0, maximumFractionDigits: 2 });
      };

      const summaryTotals = workers.reduce((acc, curr) => ({
        totalDays: acc.totalDays + curr.daysWorked,
        totalAmount: acc.totalAmount + curr.total,
        totalAdvance: acc.totalAdvance + curr.advance,
        totalBalance: acc.totalBalance + curr.balance
      }), { totalDays: 0, totalAmount: 0, totalAdvance: 0, totalBalance: 0 });

      const exportPNG = async (elementId, filename) => {
        try {
          setIsExporting(true);
          const element = document.getElementById(elementId);
          const canvas = await window.html2canvas(element, { scale: 2, backgroundColor: '#ffffff' });
          const link = document.createElement('a');
          link.download = `${filename}.png`;
          link.href = canvas.toDataURL('image/png');
          link.click();
        } catch (error) {
          alert('เกิดข้อผิดพลาดในการส่งออกไฟล์ PNG');
        } finally {
          setIsExporting(false);
        }
      };

      const exportPDF = async (elementId, filename, isPortrait = true) => {
        try {
          setIsExporting(true);
          const element = document.getElementById(elementId);
          const canvas = await window.html2canvas(element, { scale: 2, backgroundColor: '#ffffff' });
          const imgData = canvas.toDataURL('image/png');
          const pdf = new window.jspdf.jsPDF(isPortrait ? 'p' : 'l', 'mm', 'a4');
          const pdfWidth = pdf.internal.pageSize.getWidth();
          const pdfHeight = (canvas.height * pdfWidth) / canvas.width;
          pdf.addImage(imgData, 'PNG', 0, 0, pdfWidth, pdfHeight);
          pdf.save(`${filename}.pdf`);
        } catch (error) {
          alert('เกิดข้อผิดพลาดในการส่งออกไฟล์ PDF');
        } finally {
          setIsExporting(false);
        }
      };

      const exportAllSlipsPDF = async () => {
        try {
          setIsExporting(true);
          const element = document.getElementById('all-slips-export-container');
          
          const canvas = await window.html2canvas(element, { 
            scale: 2,
            backgroundColor: '#ffffff',
            windowWidth: 794 
          });

          const imgData = canvas.toDataURL('image/png');
          const pdf = new window.jspdf.jsPDF('p', 'mm', 'a4');
          
          const pdfWidth = pdf.internal.pageSize.getWidth();
          const pdfHeight = pdf.internal.pageSize.getHeight();
          const imgHeight = (canvas.height * pdfWidth) / canvas.width;
          
          let position = 0;
          let heightLeft = imgHeight;

          pdf.addImage(imgData, 'PNG', 0, position, pdfWidth, imgHeight);
          heightLeft -= pdfHeight;

          while (heightLeft > 0) {
            position -= pdfHeight;
            pdf.addPage();
            pdf.addImage(imgData, 'PNG', 0, position, pdfWidth, imgHeight);
            heightLeft -= pdfHeight;
          }

          pdf.save('สลิปค่าแรงทั้งหมด.pdf');
        } catch (error) {
          console.error(error);
          alert('เกิดข้อผิดพลาดในการส่งออกไฟล์ PDF ทั้งหมด');
        } finally {
          setIsExporting(false);
        }
      };

      const SlipTemplate = ({ worker, isModal }) => {
        if (!worker) return null;
        return (
          <div 
            id={isModal ? 'individual-slip' : `slip-${worker.id}`} 
            className={`relative bg-[#f8f6f0] border-[6px] border-[#d8d3c5] p-8 pb-12 w-full max-w-[350px] mx-auto ${isModal ? 'shadow-md' : 'shadow-none'}`}
            style={{ 
              backgroundImage: 'url("data:image/svg+xml,%3Csvg width=\'20\' height=\'20\' viewBox=\'0 0 20 20\' xmlns=\'http://www.w3.org/2000/svg\'%3E%3Cg fill=\'%23e5e5e5\' fill-opacity=\'0.4\' fill-rule=\'evenodd\'%3E%3Ccircle cx=\'3\' cy=\'3\' r=\'1\'/%3E%3C/g%3E%3C/svg%3E")'
            }}
          >
            <div className="absolute top-[-10px] left-1/2 transform -translate-x-1/2 w-32 h-8 bg-[#e3cdb4] opacity-80 rotate-1"></div>

            <div className="space-y-6 text-gray-800 relative z-10 mt-4">
              <div className="flex items-end border-b border-gray-400 pb-1">
                <span className="text-xl font-medium min-w-[60px]">ชื่อ</span>
                <span className="flex-1 text-center font-semibold text-lg">{worker.name}</span>
              </div>
              <div className="flex items-end border-b border-gray-400 pb-1">
                <span className="text-xl font-medium min-w-[100px]">วันทำงาน</span>
                <span className="flex-1 text-center font-medium">{worker.daysWorked}</span>
              </div>
              <div className="flex items-end border-b border-gray-400 pb-1">
                <span className="text-xl font-medium min-w-[100px]">ค่าแรง</span>
                <span className="flex-1 text-center font-medium">{formatNumber(worker.dailyWage)}</span>
              </div>
              <div className="flex items-end border-b border-gray-400 pb-1">
                <span className="text-xl font-medium min-w-[100px]">ยอด</span>
                <span className="flex-1 text-center font-medium">{formatNumber(worker.total)}</span>
              </div>
              <div className="flex items-end border-b border-gray-400 pb-1">
                <span className="text-xl font-medium min-w-[100px]">เบิก</span>
                <span className="flex-1 text-center font-medium">{formatNumber(worker.advance)}</span>
              </div>
              <div className="flex items-end border-b border-gray-400 pb-1">
                <span className="text-xl font-medium min-w-[100px]">คงเหลือ</span>
                <span className="flex-1 text-center font-bold text-xl">{formatNumber(worker.balance)}</span>
              </div>
            </div>

            <div className="absolute bottom-2 right-2 flex opacity-80">
              <svg width="60" height="60" viewBox="0 0 24 24" fill="#facc15" stroke="#ca8a04" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round" className="transform rotate-12">
                <circle cx="12" cy="12" r="3"></circle>
                <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path>
              </svg>
            </div>
          </div>
        );
      };

      return (
        <div className="min-h-screen p-4 md:p-8 text-gray-800">
          <div className="max-w-6xl mx-auto flex flex-col space-y-6">
            
            {/* ปุ่มกลับหน้าเมนู E-Service */}
            <a href="e-service-menu.html" className="inline-flex items-center gap-2 mb-2 px-4 py-2 bg-gray-800 text-white text-sm rounded-lg hover:bg-gray-700 transition no-print font-medium w-fit">
                <svg width="16" height="16" fill="none" stroke="currentColor" strokeWidth="2" viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"></polyline></svg>
                กลับหน้าเมนู E-Service
            </a>

            <header className="bg-white p-6 rounded-xl shadow-sm border border-gray-100 flex items-center gap-3">
              <div className="p-3 bg-blue-100 text-blue-600 rounded-lg"><IconFileText /></div>
              <div>
                <h1 className="text-2xl font-bold text-gray-800">โปรแกรมคำนวณค่าแรงคนงาน</h1>
                <p className="text-gray-500 text-sm">บันทึก คำนวณ และออกรายงานรายบุคคล / สรุป</p>
              </div>
            </header>

            <div className="grid grid-cols-1 lg:grid-cols-3 gap-6">
              
              {/* ซ้าย: ฟอร์มรับข้อมูล */}
              <div className="lg:col-span-1 bg-white p-6 rounded-xl shadow-sm border border-gray-100">
                <h2 className="text-lg font-semibold mb-4 flex items-center gap-2 text-blue-600">
                  <IconPlus /> เพิ่มรายการใหม่
                </h2>
                <form onSubmit={handleAddWorker} className="space-y-4">
                  <div>
                    <label className="block text-sm font-medium text-gray-700 mb-1">ชื่อ-สกุล</label>
                    <input type="text" name="name" value={formData.name} onChange={handleInputChange} className="w-full p-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none transition" placeholder="เช่น สมชาย ใจดี" required />
                  </div>
                  <div className="grid grid-cols-2 gap-4">
                    <div>
                      <label className="block text-sm font-medium text-gray-700 mb-1">วันทำงาน</label>
                      <input type="number" name="daysWorked" value={formData.daysWorked} onChange={handleInputChange} min="0" step="0.5" className="w-full p-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none" placeholder="จำนวนวัน" required />
                    </div>
                    <div>
                      <label className="block text-sm font-medium text-gray-700 mb-1">ค่าแรง/วัน</label>
                      <input type="number" name="dailyWage" value={formData.dailyWage} onChange={handleInputChange} min="0" className="w-full p-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none" placeholder="บาท" required />
                    </div>
                  </div>
                  <div>
                    <label className="block text-sm font-medium text-gray-700 mb-1">ยอดเบิก (ถ้ามี)</label>
                    <input type="number" name="advance" value={formData.advance} onChange={handleInputChange} min="0" className="w-full p-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none" placeholder="บาท" />
                  </div>

                  <div className="bg-gray-50 p-4 rounded-lg border border-gray-100 space-y-2 mt-4">
                    <div className="flex justify-between text-sm">
                      <span className="text-gray-600">ยอดรวม (วัน x ค่าแรง):</span>
                      <span className="font-semibold">{formatNumber(calculatedTotal)} บาท</span>
                    </div>
                    <div className="flex justify-between text-sm">
                      <span className="text-gray-600">หักเบิก:</span>
                      <span className="font-semibold text-red-500">- {formatNumber(parseFloat(formData.advance) || 0)} บาท</span>
                    </div>
                    <div className="flex justify-between text-base border-t border-gray-200 pt-2 mt-2">
                      <span className="font-bold text-gray-800">คงเหลือสุทธิ:</span>
                      <span className="font-bold text-green-600">{formatNumber(calculatedBalance)} บาท</span>
                    </div>
                  </div>

                  <button type="submit" className="w-full bg-blue-600 hover:bg-blue-700 text-white font-medium py-2.5 rounded-lg transition flex items-center justify-center gap-2">
                    <IconSave /> บันทึกข้อมูล
                  </button>
                </form>
              </div>

              {/* ขวา: ตารางสรุป */}
              <div className="lg:col-span-2 space-y-4">
                <div className="bg-white p-6 rounded-xl shadow-sm border border-gray-100">
                  <div className="flex flex-col sm:flex-row justify-between items-start sm:items-center mb-4 gap-4">
                    <h2 className="text-lg font-semibold flex items-center gap-2">
                      <IconFileText /> รายงานสรุปทั้งหมด
                    </h2>
                    
                    {workers.length > 0 && (
                      <div className="flex flex-wrap gap-2">
                        <button onClick={exportAllSlipsPDF} disabled={isExporting} className="flex items-center gap-2 px-3 py-1.5 bg-green-50 hover:bg-green-100 text-green-700 text-sm rounded-lg transition disabled:opacity-50">
                          <IconFileDown /> โหลดสลิปทั้งหมด (PDF)
                        </button>
                        <button onClick={() => exportPNG('summary-report', 'รายงานสรุปค่าแรง')} disabled={isExporting} className="flex items-center gap-2 px-3 py-1.5 bg-gray-100 hover:bg-gray-200 text-gray-700 text-sm rounded-lg transition disabled:opacity-50">
                          <IconImage /> PNG (สรุป)
                        </button>
                        <button onClick={() => exportPDF('summary-report', 'รายงานสรุปค่าแรง', false)} disabled={isExporting} className="flex items-center gap-2 px-3 py-1.5 bg-blue-50 hover:bg-blue-100 text-blue-600 text-sm rounded-lg transition disabled:opacity-50">
                          <IconFileDown /> PDF (สรุป)
                        </button>
                      </div>
                    )}
                  </div>

                  <div className="overflow-x-auto rounded-lg border border-gray-200" id="summary-report">
                    <div className="bg-white p-4">
                      {isExporting && (
                        <div className="text-center mb-4 pb-4 border-b">
                          <h2 className="text-xl font-bold">รายงานสรุปค่าแรงคนงาน</h2>
                          <p className="text-gray-500">วันที่ออกรายงาน: {new Date().toLocaleDateString('th-TH')}</p>
                        </div>
                      )}
                      <table className="w-full text-left text-sm text-gray-600">
                        <thead className="bg-gray-50 text-gray-700 uppercase">
                          <tr>
                            <th className="px-4 py-3 border-b">ลำดับ</th>
                            <th className="px-4 py-3 border-b">ชื่อ</th>
                            <th className="px-4 py-3 border-b text-right">วัน</th>
                            <th className="px-4 py-3 border-b text-right">ค่าแรง</th>
                            <th className="px-4 py-3 border-b text-right">ยอดรวม</th>
                            <th className="px-4 py-3 border-b text-right">เบิก</th>
                            <th className="px-4 py-3 border-b text-right font-bold text-gray-800">คงเหลือ</th>
                            {!isExporting && <th className="px-4 py-3 border-b text-center">จัดการ</th>}
                          </tr>
                        </thead>
                        <tbody>
                          {workers.length === 0 ? (
                            <tr><td colSpan="8" className="px-4 py-8 text-center text-gray-400">ยังไม่มีข้อมูลคนงาน กรุณาเพิ่มข้อมูลด้านซ้าย</td></tr>
                          ) : (
                            workers.map((worker, index) => (
                              <tr key={worker.id} className="border-b hover:bg-gray-50 transition">
                                <td className="px-4 py-3">{index + 1}</td>
                                <td className="px-4 py-3 font-medium text-gray-800">{worker.name}</td>
                                <td className="px-4 py-3 text-right">{worker.daysWorked}</td>
                                <td className="px-4 py-3 text-right">{formatNumber(worker.dailyWage)}</td>
                                <td className="px-4 py-3 text-right">{formatNumber(worker.total)}</td>
                                <td className="px-4 py-3 text-right text-red-500">{formatNumber(worker.advance)}</td>
                                <td className="px-4 py-3 text-right font-bold text-green-600">{formatNumber(worker.balance)}</td>
                                {!isExporting && (
                                  <td className="px-4 py-3 text-center">
                                    <div className="flex justify-center gap-2">
                                      <button onClick={() => setSelectedWorker(worker)} className="p-1.5 bg-blue-50 text-blue-600 rounded hover:bg-blue-100" title="ดูสลิป"><IconEye /></button>
                                      <button onClick={() => handleDelete(worker.id)} className="p-1.5 bg-red-50 text-red-600 rounded hover:bg-red-100" title="ลบ"><IconTrash /></button>
                                    </div>
                                  </td>
                                )}
                              </tr>
                            ))
                          )}
                        </tbody>
                        {workers.length > 0 && (
                          <tfoot className="bg-gray-50 font-bold text-gray-800">
                            <tr>
                              <td colSpan="2" className="px-4 py-3 text-right">รวมทั้งหมด</td>
                              <td className="px-4 py-3 text-right">{summaryTotals.totalDays}</td>
                              <td className="px-4 py-3 text-right">-</td>
                              <td className="px-4 py-3 text-right">{formatNumber(summaryTotals.totalAmount)}</td>
                              <td className="px-4 py-3 text-right text-red-500">{formatNumber(summaryTotals.totalAdvance)}</td>
                              <td className="px-4 py-3 text-right text-green-600">{formatNumber(summaryTotals.totalBalance)}</td>
                              {!isExporting && <td></td>}
                            </tr>
                          </tfoot>
                        )}
                      </table>
                    </div>
                  </div>
                </div>
              </div>

            </div>
          </div>

          {/* Modal รายบุคคล */}
          {selectedWorker && (
            <div className="fixed inset-0 bg-black bg-opacity-50 z-50 flex items-center justify-center p-4">
              <div className="bg-gray-100 rounded-xl max-w-md w-full overflow-hidden shadow-2xl flex flex-col max-h-[90vh]">
                <div className="bg-white px-4 py-3 border-b flex justify-between items-center">
                  <h3 className="font-semibold text-gray-800">รายงานรายบุคคล</h3>
                  <button onClick={() => setSelectedWorker(null)} className="text-gray-500 hover:text-red-500"><IconX /></button>
                </div>
                <div className="p-6 overflow-y-auto bg-[#e8ecef] flex justify-center items-center">
                  <SlipTemplate worker={selectedWorker} isModal={true} />
                </div>
                <div className="bg-white px-4 py-4 border-t flex justify-end gap-3">
                  <button onClick={() => exportPNG('individual-slip', `สลิปค่าแรง_${selectedWorker.name}`)} disabled={isExporting} className="flex items-center gap-2 px-4 py-2 bg-gray-100 hover:bg-gray-200 text-gray-800 rounded-lg transition font-medium"><IconImage /> .PNG</button>
                  <button onClick={() => exportPDF('individual-slip', `สลิปค่าแรง_${selectedWorker.name}`, true)} disabled={isExporting} className="flex items-center gap-2 px-4 py-2 bg-blue-600 hover:bg-blue-700 text-white rounded-lg transition font-medium"><IconFileDown /> .PDF</button>
                </div>
              </div>
            </div>
          )}

          {/* ส่วนสำหรับซ่อนตาราง Export PDF ทั้งหมด */}
          <div className="absolute top-[-9999px] left-[-9999px]">
            <div id="all-slips-export-container" className="w-[794px] bg-white pt-8 pb-12">
              <div className="text-center mb-8">
                <h2 className="text-2xl font-bold text-gray-800">สลิปค่าแรงคนงานทั้งหมด</h2>
                <p className="text-gray-500">วันที่: {new Date().toLocaleDateString('th-TH')}</p>
              </div>
              <div className="grid grid-cols-2 gap-y-12 gap-x-8 px-8">
                {workers.map(worker => (
                  <div key={worker.id} className="flex justify-center">
                     <SlipTemplate worker={worker} isModal={false} />
                  </div>
                ))}
              </div>
            </div>
          </div>

        </div>
      );
    };

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
